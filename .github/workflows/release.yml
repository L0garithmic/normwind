name: Release

# Publishes to npm when a version tag is pushed (scripts/release.py does the
# bump/tag/GitHub-release locally and then waits for this workflow). Runs the
# full test suite first; publishes with --provenance so npm shows a verified
# build attestation linking the package to this repo, commit, and workflow.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # required for npm --provenance attestation
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.x
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          PKG_V=$(node -p "require('./package.json').version")
          TAG_V="${GITHUB_REF_NAME#v}"
          if [ "$PKG_V" != "$TAG_V" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_V" >&2
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
